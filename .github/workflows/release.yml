name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

env:
  CARGO_INCREMENTAL: 0

jobs:
  # ---------------------------------------------------------------------------
  # Build wheels for all platforms
  # ---------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.target }} (${{ matrix.os }})
    runs-on: ${{ (matrix.os == 'linux' && 'ubuntu') || matrix.os }}-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: linux
            target: x86_64-unknown-linux-gnu
            manylinux: auto

          # Linux aarch64
          - os: linux
            target: aarch64-unknown-linux-gnu
            manylinux: 2_28

          # macOS x86_64 (Intel)
          - os: macos
            target: x86_64-apple-darwin

          # macOS arm64 (Apple Silicon)
          - os: macos
            target: aarch64-apple-darwin

          # Windows x86_64
          - os: windows
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup QEMU (for cross-compilation)
        if: matrix.os == 'linux' && matrix.target == 'aarch64-unknown-linux-gnu'
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # v4.0.0

      - name: Build wheels
        uses: PyO3/maturin-action@c0c6d69dce7c061509f7b0f5ea52050b45080fbc  # v1.50.1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || 'auto' }}
          args: --release --out dist --find-interpreter
          sccache: ${{ matrix.os != 'windows' }}

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl

  # ---------------------------------------------------------------------------
  # Build source distribution
  # ---------------------------------------------------------------------------
  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: PyO3/maturin-action@c0c6d69dce7c061509f7b0f5ea52050b45080fbc  # v1.50.1
        with:
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: sdist
          path: dist/*.tar.gz

  # ---------------------------------------------------------------------------
  # Test built wheels on multiple platforms
  # ---------------------------------------------------------------------------
  test:
    name: Test ${{ matrix.os }} (Python ${{ matrix.python }})
    needs: build
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: '3.12'
            target: linux-x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            python: '3.13'
            target: linux-x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            python: '3.14'
            target: linux-x86_64-unknown-linux-gnu
          - os: macos-14
            python: '3.12'
            target: macos-aarch64-apple-darwin
          - os: windows-latest
            python: '3.12'
            target: windows-x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: wheels-${{ matrix.target }}
          path: dist/

      - name: Install wheel + test deps
        shell: bash
        run: |
          pip install dist/*.whl
          pip install pytest pytest-asyncio httpx websockets

      - name: Run tests
        shell: bash
        run: |
          rm -rf wse_server/
          pytest tests/ -v --tb=short

  # ---------------------------------------------------------------------------
  # Publish to PyPI (trusted publishing via OIDC)
  # ---------------------------------------------------------------------------
  publish:
    name: Publish to PyPI
    needs: [build, sdist, test]
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://pypi.org/project/wse-server/
    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: dist/
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          packages-dir: dist/
          skip-existing: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe  # v2.6.1
        with:
          generate_release_notes: true
          files: dist/*

  # ---------------------------------------------------------------------------
  # Build + test + publish wse-client (Python) to PyPI
  # ---------------------------------------------------------------------------
  publish-python-client:
    name: Publish Python Client to PyPI
    needs: [publish]
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://pypi.org/project/wse-client/
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install build tools + test deps
        run: pip install build pytest pytest-asyncio

      - name: Install package + optional deps
        run: pip install -e "python-client[all]"

      - name: Run tests
        run: pytest python-client/tests/ -v --tb=short

      - name: Build sdist + wheel
        run: python -m build python-client/ --outdir python-client-dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          packages-dir: python-client-dist/
          skip-existing: true

  # ---------------------------------------------------------------------------
  # Publish wse-client to npm
  # ---------------------------------------------------------------------------
  publish-npm:
    name: Publish to npm
    needs: [publish]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Sync version from tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          npm version "$TAG" --no-git-tag-version --allow-same-version

      - name: Check if version exists on npm
        id: npm-check
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          if npm view wse-client@"$TAG" version 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.npm-check.outputs.exists == 'false'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
