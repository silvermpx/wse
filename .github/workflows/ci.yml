name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: 0

jobs:
  # ---------------------------------------------------------------------------
  # TS client: type-check + build
  # ---------------------------------------------------------------------------
  client:
    name: Client (TS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build

  # ---------------------------------------------------------------------------
  # Python client: lint + tests
  # ---------------------------------------------------------------------------
  python-client:
    name: Python Client (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ['3.11', '3.12', '3.13', '3.14']

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python }}
          cache: 'pip'

      - name: Install
        run: |
          pip install ruff
          pip install -e "python-client[all,dev]"

      - name: Ruff check
        run: ruff check python-client/

      - name: Ruff format
        run: ruff format --check python-client/

      - name: Run tests
        run: pytest python-client/tests/ -v --tb=short

  # ---------------------------------------------------------------------------
  # Python server: lint + type-check
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install ruff mypy

      - name: Ruff check
        run: ruff check wse_server/ tests/

      - name: Ruff format
        run: ruff format --check wse_server/ tests/

  # ---------------------------------------------------------------------------
  # Rust: clippy + fmt
  # ---------------------------------------------------------------------------
  rust-lint:
    name: Rust Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          workspaces: "rust -> target"

      - name: Format check
        run: cargo fmt --manifest-path rust/Cargo.toml -- --check

      - name: Clippy
        run: cargo clippy --manifest-path rust/Cargo.toml -- -D warnings

  # ---------------------------------------------------------------------------
  # Python server: build Rust + run tests
  # ---------------------------------------------------------------------------
  test:
    name: Test (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ['3.12', '3.13', '3.14']

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python }}
          cache: 'pip'

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          workspaces: "rust -> target"

      - name: Create virtualenv + install deps
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install maturin pytest pytest-asyncio pytest-cov httpx websockets

      - name: Build Rust extension
        run: |
          source .venv/bin/activate
          maturin develop --release

      - name: Run tests
        run: |
          source .venv/bin/activate
          pytest tests/ -v --tb=short

  # ---------------------------------------------------------------------------
  # Security: dependency audit
  # ---------------------------------------------------------------------------
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Rust dependency audit
        run: cargo audit --file rust/Cargo.lock --ignore RUSTSEC-2023-0071
        # RUSTSEC-2023-0071: rsa crate Marvin Attack (timing side-channel in RSA decryption).
        # Not exploitable: WSE uses jsonwebtoken for JWT signature verification only,
        # never RSA decryption. No fix available upstream.

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: '22'

      - name: npm audit
        run: npm audit --audit-level=high || true
